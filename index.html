<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>⚡ System Monitor — Live</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg: #0a0e1a; --card: #1e2a3a; --card2: #243040;
  --border: #2d3f55; --text: #e2e8f0; --muted: #94a3b8;
  --cpu: #00d4ff; --ram: #7c3aed; --fps: #10b981;
  --gpu: #ff6b6b;
  --warn: #f59e0b; --danger: #ef4444;
}
body { font-family: 'Segoe UI', system-ui, sans-serif;
       background: var(--bg); color: var(--text); min-height: 100vh; }

/* HEADER */
.header { background: #111827; border-bottom: 1px solid var(--border);
          padding: 18px 32px; display: flex; justify-content: space-between; align-items: center; }
.header h1 { font-size: 20px; font-weight: 700;
             background: linear-gradient(135deg, #fff, var(--cpu));
             background-clip: text;
             -webkit-background-clip: text;
             -webkit-text-fill-color: transparent;
             color: transparent; }
.status-pill { display: flex; align-items: center; gap: 8px;
               padding: 6px 16px; border-radius: 20px; font-size: 12px;
               font-weight: 700; letter-spacing: 1px; transition: all 0.3s; }
.status-pill.live   { background: rgba(16,185,129,.1); border: 1px solid rgba(16,185,129,.3); color: var(--fps); }
.status-pill.error  { background: rgba(239,68,68,.1);  border: 1px solid rgba(239,68,68,.3);  color: var(--danger); }
.status-pill.warn   { background: rgba(245,158,11,.1); border: 1px solid rgba(245,158,11,.3); color: var(--warn); }
.blink { width: 7px; height: 7px; border-radius: 50%; background: currentColor;
         animation: blink 1.5s infinite; }
@keyframes blink { 0%,100% { opacity:1; } 50% { opacity:0.2; } }

/* DASHBOARD */
.dashboard { max-width: 1100px; margin: 0 auto; padding: 28px 20px; }
.metrics-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
               gap: 20px; margin-bottom: 24px; }

/* CARDS */
.metric-card { background: var(--card); border: 1px solid var(--border);
               border-radius: 16px; padding: 24px; transition: transform 0.2s, border-color 0.3s; }
.metric-card:hover { transform: translateY(-3px); }
.card-label { font-size: 10px; font-weight: 700; letter-spacing: 2px;
              color: var(--muted); text-transform: uppercase; margin-bottom: 8px; }
.metric-value { font-size: 52px; font-weight: 700; font-family: monospace;
                line-height: 1.1; margin-bottom: 4px; }
.metric-sub { font-size: 12px; color: var(--muted); margin-bottom: 14px; }
.cpu-card .metric-value { color: var(--cpu); }
.ram-card .metric-value { color: var(--ram); }
.fps-card .metric-value { color: var(--fps); }
.gpu-card .metric-value { color: var(--gpu); }
.progress-bar { background: rgba(255,255,255,0.05); height: 6px; border-radius: 6px;
                overflow: hidden; margin-bottom: 16px; }
.progress-fill { height: 100%; border-radius: 6px; width: 0%;
                 transition: width 0.5s ease, background 0.3s; }
.cpu-fill { background: var(--cpu); }
.ram-fill { background: var(--ram); }
.fps-fill { background: var(--fps); }
.gpu-fill { background: var(--gpu); }

/* Per-GPU mini cards */
.gpu-list .gpu-item { background: var(--card2); border: 1px solid var(--border);
                     border-radius: 12px; padding: 12px; display:flex; gap:10px; align-items:center; }
.gpu-list .gpu-item .meta { flex:1 }
.gpu-list .gpu-item .meta .label { font-size:11px; color:var(--muted); margin-bottom:6px }
.gpu-list .gpu-item .meta .value { font-size:20px; font-weight:700; color:var(--gpu); }
.gpu-list .gpu-item .chart-wrap { width:120px; height:34px }

/* CHART */
.chart-wrap { height: 70px; }

/* ALERT LOG */
.alert-section { background: var(--card); border: 1px solid var(--border);
                 border-radius: 12px; padding: 16px 20px; }
.alert-title { font-size: 11px; color: var(--muted); text-transform: uppercase;
               letter-spacing: 2px; margin-bottom: 12px; }
#alert-log { min-height: 50px; }
.alert-item { font-size: 13px; padding: 8px 12px; border-radius: 8px;
              margin-bottom: 8px; font-family: monospace; animation: slideIn 0.3s ease; }
@keyframes slideIn { from { opacity:0; transform:translateX(-10px); } to { opacity:1; transform:translateX(0); } }
.alert-item.danger { background: rgba(239,68,68,.1); color: #fca5a5; border-left: 3px solid var(--danger); }
.alert-item.warn   { background: rgba(245,158,11,.1); color: #fde68a; border-left: 3px solid var(--warn); }
.alert-item.info   { background: rgba(0,212,255,.08); color: var(--muted); border-left: 3px solid var(--cpu); }

/* RESPONSIVE */
@media(max-width:600px) { .metrics-row { grid-template-columns: 1fr; }
  .header { padding: 14px 16px; } .metric-value { font-size: 40px; } }
</style>
</head>
<body>

<header class="header">
  <h1>⚡ System Monitor</h1>
  <div class="status-pill warn" id="status">
    <span class="blink"></span> CONNECTING...
  </div>
</header>

<main class="dashboard">
  <div class="metrics-row">

    <div class="metric-card cpu-card">
      <div class="card-label">🔥 CPU Usage</div>
      <div class="metric-value" id="cpu-val">--%</div>
      <div class="metric-sub" id="cpu-sub">Loading...</div>
      <div class="progress-bar"><div class="progress-fill cpu-fill" id="cpu-bar"></div></div>
      <div class="chart-wrap"><canvas id="cpu-chart"></canvas></div>
    </div>

    <div class="metric-card ram-card">
      <div class="card-label">💾 RAM Usage</div>
      <div class="metric-value" id="ram-val">--%</div>
      <div class="metric-sub" id="ram-sub">Loading...</div>
      <div class="progress-bar"><div class="progress-fill ram-fill" id="ram-bar"></div></div>
      <div class="chart-wrap"><canvas id="ram-chart"></canvas></div>
    </div>

    <div class="metric-card gpu-card">
      <div class="card-label">🎛️ GPU</div>
      <div class="metric-value" id="gpu-val">--%</div>
      <div class="metric-sub" id="gpu-sub">Detecting GPU...</div>
      <div class="progress-bar"><div class="progress-fill gpu-fill" id="gpu-bar"></div></div>
      <div class="chart-wrap"><canvas id="gpu-chart"></canvas></div>
    </div>

    <div class="metric-card fps-card">
      <div class="card-label">🎮 FPS</div>
      <div class="metric-value" id="fps-val">--</div>
      <div class="metric-sub" id="fps-sub">Real FPS status will appear here</div>
      <div class="progress-bar"><div class="progress-fill fps-fill" id="fps-bar"></div></div>
      <div class="chart-wrap"><canvas id="fps-chart"></canvas></div>
    </div>

  </div>

  <!-- Per-GPU mini cards (dynamically populated) -->
  <div id="gpu-list" class="metrics-row" style="margin-top:14px"></div>

  <div class="alert-section">
    <div class="alert-title">⚠️ Alert Log</div>
    <div id="alert-log"></div>
  </div>

  <div class="alert-section" style="margin-top:14px;">
    <div class="alert-title">🧪 GPU Diagnostics</div>
    <div id="gpu-diagnostics" style="font-size:13px; color:var(--muted); line-height:1.7;">
      Running GPU health checks...
    </div>
  </div>
</main>

<script>
// ════════════════════════════════════════════════
// FRONTEND JAVASCRIPT — Complete Production Code
// WebSocket se data leta hai aur DOM update karta hai
// ════════════════════════════════════════════════

// ─── CHART SETUP ───
function makeChart(id, color, max=100) {
  const ctx = document.getElementById(id).getContext('2d');
  return new Chart(ctx, {
    type: 'line',
    data: {
      labels: new Array(40).fill(''),
      datasets: [{ data: new Array(40).fill(0), borderColor: color,
        borderWidth: 2, fill: true, tension: 0.4, pointRadius: 0,
        backgroundColor: color + '18' }]
    },
    options: { animation: false, plugins: { legend: { display: false } },
      scales: { x: { display: false }, y: { display: false, min: 0, max: max } } }
  });
}

const cpuChart = makeChart('cpu-chart', '#00d4ff', 100);
const ramChart = makeChart('ram-chart', '#7c3aed', 100);
const fpsChart = makeChart('fps-chart', '#10b981', 144);
const gpuChart = makeChart('gpu-chart', '#ff6b6b', 100);
const gpuCharts = {}; // per-GPU small charts map: index -> Chart

function addPoint(chart, val) {
  chart.data.datasets[0].data.push(val);
  if (chart.data.datasets[0].data.length > 40) chart.data.datasets[0].data.shift();
  chart.update('none');
}

// ─── STATUS PILL ───
function setStatus(text, type) {
  const el = document.getElementById('status');
  el.className = 'status-pill ' + type;
  el.innerHTML = `<span class="blink"></span> ${text}`;
}

// ─── DOM UPDATE ───
function updateDisplay(data) {
  // CPU
  document.getElementById('cpu-val').textContent = data.cpu + '%';
  document.getElementById('cpu-bar').style.width  = data.cpu + '%';
  document.getElementById('cpu-sub').textContent  =
    `${data.cpu_cores || '--'} cores @ ${data.cpu_freq_mhz || '--'} MHz`;

  // RAM
  document.getElementById('ram-val').textContent = data.ram + '%';
  document.getElementById('ram-bar').style.width  = data.ram + '%';
  document.getElementById('ram-sub').textContent  =
    `${data.ram_used_gb} GB / ${data.ram_total_gb} GB`;

  // FPS
  const fpsValue = Number.isFinite(data.fps) && data.fps > 0 ? data.fps : 'N/A';
  document.getElementById('fps-val').textContent = fpsValue;
  document.getElementById('fps-bar').style.width  = (Math.min(Number(data.fps) || 0, 144) / 144 * 100) + '%';

  const statusText = data.fps_status === 'live'
    ? `Real FPS from dxcam • ${data.fps_message || 'Live capture active'}`
    : (data.fps_message || 'FPS detection unavailable on this machine');
  document.getElementById('fps-sub').textContent = statusText;

  // Disk card color
  document.querySelector('.cpu-card').style.borderColor =
    data.cpu > 85 ? '#ef4444' : data.cpu > 65 ? '#f59e0b' : '#2d3f55';

  // Charts
  addPoint(cpuChart, data.cpu);
  addPoint(ramChart, data.ram);
  addPoint(fpsChart, data.fps);

  // GPU — show primary GPU (first) with fallback
  const gpuStatus = data.gpu_status || { detected: false, reason: 'GPU detection unavailable' };
  const primary = data.gpu || (data.gpus && data.gpus[0]) || null;
  if (primary && gpuStatus.detected) {
    const util = Number.isFinite(primary.utilization) ? primary.utilization : 0;
    const avgUtil = Number.isFinite(primary.utilization_avg) ? primary.utilization_avg : util;
    document.getElementById('gpu-val').textContent = util + '%';
    document.getElementById('gpu-bar').style.width = Math.min(util, 100) + '%';
    const memInfo = primary.memory_used_mb != null && primary.memory_total_mb != null
      ? `${primary.memory_used_mb} MB / ${primary.memory_total_mb} MB (${primary.memory_used_pct}%)`
      : 'Memory info unavailable';
    let name = primary.name || 'GPU';
    const others = (data.gpus && data.gpus.length > 1) ? ` • +${data.gpus.length-1} more` : '';
    document.getElementById('gpu-sub').textContent = `${name}${others} • Current ${util}% • Avg ${avgUtil}% • ${memInfo}`;
    addPoint(gpuChart, avgUtil);
  } else {
    document.getElementById('gpu-val').textContent = 'N/A';
    document.getElementById('gpu-bar').style.width = '0%';
    document.getElementById('gpu-sub').textContent = gpuStatus.reason || 'No GPU detected or unsupported';
    addPoint(gpuChart, 0);
  }

  const gpuCard = document.querySelector('.gpu-card');
  if (gpuCard) {
    if (!gpuStatus.detected) {
      const reason = (gpuStatus.reason || '').toLowerCase();
      const border = reason.includes('permission') || reason.includes('denied')
        ? '#f59e0b'
        : '#ef4444';
      gpuCard.style.borderColor = border;
    } else {
      gpuCard.style.borderColor = '#2d3f55';
    }
  }

  // Ensure per-GPU mini-cards and update them
  ensureGpuCards(data.gpus || []);
  if (data.gpus && data.gpus.length) {
    data.gpus.forEach((g, idx) => {
      const util = Number.isFinite(g.utilization) ? g.utilization : 0;
      const avgUtil = Number.isFinite(g.utilization_avg) ? g.utilization_avg : util;
      const elVal = document.getElementById(`gpu-${idx}-val`);
      if (elVal) elVal.textContent = util + '%';
      const sub = document.getElementById(`gpu-${idx}-sub`);
      if (sub) sub.textContent = `${g.name || 'GPU'} • Current ${util}% • Avg ${avgUtil}% • ${g.memory_used_pct != null ? g.memory_used_pct + '%' : 'mem N/A'}`;
      // update chart
      const chart = gpuCharts[idx];
      if (chart) addPoint(chart, avgUtil);
    });
  }

  // GPU alerts
  checkGpuAlerts(data.gpus || []);
  checkGpuStatusAlert(data.gpu_status);

  // Alerts (CPU/RAM/etc)
  checkAlerts(data);
}

let lastGpuStatusAlert = '';
function checkGpuStatusAlert(gpuStatus) {
  if (!gpuStatus || gpuStatus.detected) return;
  const reason = gpuStatus.reason || 'GPU detection failed';
  if (lastGpuStatusAlert === reason) return;
  addAlert(`🖥️ GPU STATUS: ${reason}`, 'warn');
  lastGpuStatusAlert = reason;
}

// GPU-specific alerts: temperature and VRAM
function checkGpuAlerts(gpus) {
  if (!gpus || !gpus.length) return;
  for (let i = 0; i < gpus.length; i++) {
    const g = gpus[i];
    if (!g) continue;
    if (g.temperature_c != null && g.temperature_c > 85) {
      addAlert(`🔥 GPU ${i} HIGH TEMP: ${g.temperature_c}°C (${g.name})`, 'danger');
    }
    if (g.memory_used_pct != null && g.memory_used_pct > 90) {
      addAlert(`💾 GPU ${i} VRAM HIGH: ${g.memory_used_pct}% used (${g.name})`, 'warn');
    }
  }
}

// Create or remove per-GPU cards to match current GPUs
function ensureGpuCards(gpus) {
  const container = document.getElementById('gpu-list');
  if (!container) return;
  // remove extra
  const existing = Array.from(container.children);
  if (existing.length > gpus.length) {
    for (let i = gpus.length; i < existing.length; i++) {
      const node = document.getElementById(`gpu-${i}-card`);
      if (node) node.remove();
      delete gpuCharts[i];
    }
  }

  // add missing
  for (let i = 0; i < gpus.length; i++) {
    let card = document.getElementById(`gpu-${i}-card`);
    if (!card) {
      card = document.createElement('div');
      card.className = 'metric-card gpu-item gpu-card';
      card.id = `gpu-${i}-card`;
      card.innerHTML = `
        <div class="meta">
          <div class="label">GPU ${i}</div>
          <div class="value" id="gpu-${i}-val">--%</div>
          <div class="metric-sub" id="gpu-${i}-sub">Initializing...</div>
        </div>
        <div class="chart-wrap"><canvas id="gpu-${i}-chart"></canvas></div>
      `;
      container.appendChild(card);
      // create small chart
      const c = makeChart(`gpu-${i}-chart`, '#ff6b6b', 100);
      gpuCharts[i] = c;
    }
  }
}

// ─── ALERT SYSTEM ───
let lastAlert = 0;
function checkAlerts(data) {
  const now = Date.now();
  if (now - lastAlert < 10000) return;
  if (data.cpu > 80) {
    addAlert(`🔥 CPU HIGH:host ${data.cpu}% — Close heavy apps!`, 'danger');
    lastAlert = now;
  } else if (data.ram > 85) {
    addAlert(`💾 RAM HIGH: ${data.ram}% — ${data.ram_used_gb}GB used!`, 'warn');
    lastAlert = now;
  }
}

function addAlert(msg, type) {
  const log = document.getElementById('alert-log');
  const el = document.createElement('div');
  el.className = 'alert-item ' + type;
  el.textContent = new Date().toLocaleTimeString() + '  ' + msg;
  log.prepend(el);
  while (log.children.length > 6) log.removeChild(log.lastChild);
}

async function fetchGpuDiagnostics() {
  const panel = document.getElementById('gpu-diagnostics');
  if (!panel) return;
  try {
    const response = await fetch('https://real-time-system-dashboard.onrender.com/api/gpu/diagnostics');
    const data = await response.json();
    const d = data.diagnostics || {};
    panel.innerHTML = `
      <strong>Detected:</strong> ${d.detected ? 'Yes' : 'No'}<br>
      <strong>Driver installed:</strong> ${d.driver_installed ? 'Yes' : 'No'}<br>
      <strong>NVML working:</strong> ${d.nvml_working ? 'Yes' : 'No'}<br>
      <strong>VRAM accessible:</strong> ${d.vram_accessible ? 'Yes' : 'No'}<br>
      <strong>Utilization updating:</strong> ${d.utilization_updating ? 'Yes' : 'No'}<br>
      <strong>Temperature updating:</strong> ${d.temperature_updating ? 'Yes' : 'No'}<br>
      <strong>Summary:</strong> ${d.summary || 'Unavailable'}
    `;
  } catch (e) {
    panel.textContent = 'GPU diagnostics unavailable';
  }
}

// ─── WEBSOCKET CONNECTION ───
let ws, reconnectTimer;

function connect() {
  clearTimeout(reconnectTimer);
  setStatus('CONNECTING...', 'warn');

  try {
    ws = new WebSocket('wss://real-time-system-dashboard.onrender.com/ws');
  } catch(e) {
    setStatus('ERROR — Check Python server', 'error');
    reconnectTimer = setTimeout(connect, 5000);
    return;
  }

  ws.onopen = () => {
    setStatus('LIVE — Real Data', 'live');
    addAlert('✅ Connected to Python backend! Real data streaming.', 'info');
  };

  ws.onmessage = (event) => {
    try {
      const data = JSON.parse(event.data);
      updateDisplay(data);
    } catch(e) {
      console.error('Parse error:', e);
    }
  };

  ws.onclose = () => {
    setStatus('DISCONNECTED — Retrying...', 'error');
    reconnectTimer = setTimeout(connect, 5000);
  };

  ws.onerror = () => {
    setStatus('ERROR — Is server.py running?', 'error');
  };
}

// ─── INIT ───
addAlert('ℹ️ Starting... Run: python server.py', 'info');
fetchGpuDiagnostics();
connect();
</script>
</body>
</html>
